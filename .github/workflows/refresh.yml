name: Refresh Berita

on:
  workflow_dispatch:           # tombol "Run" manual (dipicu cron-job.org)

concurrency:
  group: refresh-berita
  cancel-in-progress: false    # anti tumpang-tindih: yang baru menunggu, tidak menumpuk

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45         # safe buffer selama backlog terkuras
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: node scripts/refresh-all.js
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}