<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dataminr Lite</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{ --bg:#0b0e14; --panel:#141925; --panel2:#1c2333; --border:#2a3344; --text:#e6e9ef; --muted:#8a93a6; --flash:#ff3b3b; --urgent:#ff9f1c; --info:#ffd23f; --accent:#3b82f6; }
*{ box-sizing:border-box; }
html,body{ height:100%; }
body{ margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,"Segoe UI",Roboto,sans-serif; display:flex; flex-direction:column; }
header{ flex:0 0 auto; background:rgba(11,14,20,.95); border-bottom:1px solid var(--border); padding:12px 20px; }
.topbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.brand{ display:flex; align-items:center; gap:10px; font-weight:800; font-size:19px; letter-spacing:.5px; }
.live{ display:inline-flex; align-items:center; gap:6px; font-size:12px; color:#4ade80; font-weight:700; }
.dot-live{ width:8px; height:8px; border-radius:50%; background:#4ade80; animation:pulseLive 1.6s infinite; }
@keyframes pulseLive{ 0%{box-shadow:0 0 0 0 rgba(74,222,128,.7);} 70%{box-shadow:0 0 0 8px rgba(74,222,128,0);} 100%{box-shadow:0 0 0 0 rgba(74,222,128,0);} }
.actions{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.search{ background:var(--panel2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:6px 10px; font-size:13px; width:180px; outline:none; }
.search:focus{ border-color:var(--accent); }
.btn{ background:var(--panel2); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:6px 10px; font-size:13px; cursor:pointer; }
.btn.active{ color:#fff; border-color:var(--accent); background:rgba(59,130,246,.18); }
.sub{ color:var(--muted); font-size:12px; margin-top:6px; }
.ticker{ overflow:hidden; white-space:nowrap; border-top:1px solid var(--border); margin-top:8px; padding-top:7px; }
.ticker.hide{ display:none; }
.ticker-track{ display:inline-block; white-space:nowrap; animation:tick 100s linear infinite; }
.ticker:hover .ticker-track{ animation-play-state:paused; }
@keyframes tick{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
.tk{ font-size:12.5px; margin-right:34px; cursor:pointer; color:#e6e9ef; }
.tk b{ color:var(--flash); }
.layout{ flex:1 1 auto; display:flex; min-height:0; }
.feedpane{ width:46%; overflow-y:auto; padding:14px 16px; border-right:1px solid var(--border); }
.feedpane.full{ width:100%; border-right:none; }
.mappane{ width:54%; position:relative; }
.mappane.hide{ display:none; }
#map{ position:absolute; inset:0; background:#0b0e14; }
.filters{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
.chip{ background:var(--panel2); border:1px solid var(--border); color:var(--muted); padding:6px 12px; border-radius:999px; font-size:13px; cursor:pointer; user-select:none; }
.chip.active{ color:#fff; border-color:var(--accent); background:rgba(59,130,246,.18); }
.group-head{ color:var(--muted); font-size:12px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; margin:10px 2px; padding-top:8px; border-top:1px solid var(--border); }
.group-head.first{ border-top:none; padding-top:0; margin-top:0; }
.card{ background:var(--panel); border:1px solid var(--border); border-left-width:4px; border-radius:10px; padding:12px 14px; margin-bottom:12px; cursor:pointer; transition:outline .15s; }
.card.flash{ border-left-color:var(--flash); } .card.urgent{ border-left-color:var(--urgent); } .card.info{ border-left-color:var(--info); } .card.none{ border-left-color:var(--border); }
.card.active{ outline:2px solid var(--accent); outline-offset:1px; }
body.compact .card{ padding:7px 11px; margin-bottom:7px; }
body.compact .summary{ display:none; }
body.compact .tags{ margin-top:5px; }
body.compact .title{ font-size:14px; }
.row1{ display:flex; align-items:center; gap:10px; margin-bottom:6px; flex-wrap:wrap; }
.lvl{ font-size:11px; font-weight:800; letter-spacing:.5px; padding:2px 8px; border-radius:6px; }
.lvl.flash{ background:var(--flash); color:#fff; } .lvl.urgent{ background:var(--urgent); color:#0b0e14; } .lvl.info{ background:var(--info); color:#0b0e14; } .lvl.none{ background:#3a4252; color:#cfd6e4; }
.time{ color:var(--muted); font-size:12px; } .pinhint{ font-size:12px; }
.title{ font-weight:600; font-size:15px; line-height:1.35; }
.title a{ color:var(--text); text-decoration:none; } .title a:hover{ color:var(--accent); }
.summary{ color:#c3cad8; font-size:13.5px; margin-top:6px; }
.tags{ margin-top:8px; display:flex; gap:6px; flex-wrap:wrap; }
.tag{ font-size:11px; color:var(--muted); background:var(--panel2); border:1px solid var(--border); padding:2px 8px; border-radius:6px; }
.tag.loc{ color:#7dd3fc; border-color:#1e3a52; } .tag.ent{ color:#fcd34d; border-color:#4a3c12; }
.empty{ color:var(--muted); text-align:center; padding:40px; }
.leaflet-popup-content-wrapper,.leaflet-popup-tip{ background:var(--panel); color:var(--text); }
.leaflet-popup-content{ margin:10px 12px; font-size:13px; line-height:1.4; }
.leaflet-popup-content a{ color:var(--accent); }
@media(max-width:820px){ .layout{ flex-direction:column; } .feedpane,.mappane{ width:100%; } .feedpane{ border-right:none; } .mappane{ height:55vh; flex:0 0 auto; } }
</style>
</head>
<body>
<header>
  <div class="topbar">
    <div class="brand">🛰️ DATAMINR LITE <span class="live"><span class="dot-live"></span>LIVE</span></div>
    <div class="actions">
      <input id="search" class="search" type="text" placeholder="🔍 Cari berita...">
      <button id="btnCompact" class="btn" type="button">📰 Padat</button>
      <button id="btnMap" class="btn" type="button">🗺️ Sembunyikan Peta</button>
    </div>
  </div>
  <div class="sub" id="sub">Memuat…</div>
  <div class="ticker hide" id="ticker"></div>
</header>
<div class="layout">
  <div class="feedpane"><div class="filters" id="filters"></div><div id="feed"><div class="empty">Memuat…</div></div></div>
  <div class="mappane"><div id="map"></div></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const HARI=14;
let SEMUA=[], byId={}, markerById={};
let fKat='semua', fUrg='semua', fSort='skor', fQuery='', compact=false, mapHidden=false;
let map, markersLayer;
const cap=(s)=> s? s.charAt(0).toUpperCase()+s.slice(1):s;
const KAT_LABEL={ semua:'Semua', sosmed:'📱 Social Media', bencana:'🚨 Bencana', indonesia:'Indonesia', komoditas:'Komoditas', geopolitik:'Geopolitik' };
const katLabel=(k)=> KAT_LABEL[k] || cap(k);
function urgency(s){ if(s==null) return 'none'; if(s>=8) return 'flash'; if(s>=5) return 'urgent'; return 'info'; }
function urgLabel(u){ return {flash:'FLASH',urgent:'URGENT',info:'INFO',none:'—'}[u]; }
function colorOf(u){ return {flash:'#ff3b3b',urgent:'#ff9f1c',info:'#ffd23f',none:'#8a93a6'}[u]; }
function parseEntities(e){ if(!e) return []; if(Array.isArray(e)) return e; try{ const p=JSON.parse(e); return Array.isArray(p)?p:[]; }catch(_){ return []; } }
function num(v){ if(v==null) return null; const n=Number(v); return isNaN(n)?null:n; }
function waktuRelatif(d){ if(!d) return ''; const t=new Date(d).getTime(); if(isNaN(t)) return ''; const diff=Date.now()-t, m=Math.floor(diff/60000), h=Math.floor(diff/3600000), hari=Math.floor(diff/86400000); if(m<1) return 'Baru saja'; if(m<60) return m+' menit lalu'; if(h<24) return h+' jam lalu'; return hari+' hari lalu'; }
function timeBucket(d){ if(!d) return 'Tanpa Tanggal'; const t=new Date(d).getTime(); if(isNaN(t)) return 'Tanpa Tanggal'; const now=new Date(); const startToday=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime(); if(t>=startToday) return 'Hari Ini'; if(t>=startToday-86400000) return 'Kemarin'; if(t>=startToday-7*86400000) return '7 Hari Terakhir'; return 'Lebih Lama'; }
/* ===== Widget "Sedang Ramai" (Buzzword v1) ===== */
const BUZZ_WINDOW_H   = 12;   // jendela waktu utama (jam)
const BUZZ_FALLBACK_H = 24;   // melebar otomatis kalau berita sedikit
const BUZZ_MIN_ITEMS  = 15;   // ambang pelebaran
const BUZZ_TOP_N      = 5;    // jumlah badge
const BUZZ_MIN_COUNT  = 2;    // minimal kemunculan agar dianggap "ramai"
const BUZZ_BLOCKLIST  = new Set([
  'indonesia','global','as','amerika serikat','dunia','ri','nasional',
  'ekonomi','pemerintah','berita','internasional','negara','update','breaking','news'
]);

function buzzInjectStyle(){
  if(document.getElementById('buzzStyle')) return;
  const st=document.createElement('style'); st.id='buzzStyle';
  st.textContent=`
  .buzzbar{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:7px; font-size:12px; }
  .buzzbar .buzz-lbl{ color:var(--muted); font-weight:700; letter-spacing:.3px; }
  .buzz{ background:var(--panel2); border:1px solid var(--border); color:var(--info);
         padding:3px 10px; border-radius:999px; cursor:pointer; user-select:none;
         font-weight:600; transition:all .15s; }
  .buzz:hover{ border-color:var(--accent); color:#fff; }
  .buzz.active{ background:rgba(59,130,246,.18); border-color:var(--accent); color:#fff; }
  .buzz .n{ color:var(--muted); font-weight:500; margin-left:4px; }
  .buzz-empty{ color:var(--muted); font-style:italic; }`;
  document.head.appendChild(st);
}

function buzzPool(){
  const inWin=(h)=>{ const cut=Date.now()-h*3600000;
    return SEMUA.filter(b=>{ if(!b.pub_date) return false;
      const t=new Date(b.pub_date).getTime(); return !isNaN(t) && t>=cut; }); };
  let pool=inWin(BUZZ_WINDOW_H), hrs=BUZZ_WINDOW_H;
  if(pool.length<BUZZ_MIN_ITEMS){ pool=inWin(BUZZ_FALLBACK_H); hrs=BUZZ_FALLBACK_H; }
  if(pool.length<BUZZ_MIN_ITEMS){ pool=SEMUA.slice(); hrs=null; }
  return { pool, hrs };
}

function buildBuzzwords(){
  buzzInjectStyle();
  const sub=document.getElementById('sub'); if(!sub) return;
  let bar=document.getElementById('buzzbar');
  if(!bar){ bar=document.createElement('div'); bar.className='buzzbar'; bar.id='buzzbar';
    sub.parentNode.insertBefore(bar, sub.nextSibling); }

  const { pool, hrs } = buzzPool();
  const counts={};
  pool.forEach(b=> (b.entities||[]).forEach(e=>{
    const raw=String(e||'').trim(); if(raw.length<2) return;
    const key=raw.toLowerCase();
    if(BUZZ_BLOCKLIST.has(key)) return;
    if(/^\d+$/.test(key)) return;
    if(!counts[key]) counts[key]={ n:0, label:raw };
    counts[key].n++;
  }));
  const top=Object.values(counts).filter(c=>c.n>=BUZZ_MIN_COUNT)
    .sort((a,b)=>b.n-a.n).slice(0,BUZZ_TOP_N);

  const winTxt = hrs ? hrs+'j' : 'semua';
  if(!top.length){
    bar.innerHTML='<span class="buzz-lbl">🔥 Sedang Ramai ('+winTxt+'):</span> <span class="buzz-empty">belum ada tren menonjol</span>';
    return;
  }
  bar.innerHTML='<span class="buzz-lbl">🔥 Sedang Ramai ('+winTxt+'):</span> '+
    top.map(c=>'<span class="buzz'+(fQuery===c.label.toLowerCase()?' active':'')+'" data-w="'+c.label.replace(/"/g,'&quot;')+'">'+c.label+'<span class="n">'+c.n+'</span></span>').join('');
  bar.querySelectorAll('.buzz').forEach(el=>el.onclick=()=>{
    const w=el.dataset.w||''; const s=document.getElementById('search');
    if(fQuery===w.toLowerCase()){ fQuery=''; if(s) s.value=''; }   // klik lagi = lepas filter
    else { fQuery=w.toLowerCase(); if(s) s.value=w; }
    render(); buildBuzzwords();
  });
}
/* ===== Track Story (Pantau Peristiwa) v1 ===== */
let fTracked = false;
function loadTracked(){ try{ return new Set(JSON.parse(localStorage.getItem('trackedStories')||'[]')); }catch(_){ return new Set(); } }
let TRACKED = loadTracked();
function saveTracked(){ try{ localStorage.setItem('trackedStories', JSON.stringify([...TRACKED])); }catch(_){} }
function isTracked(link){ return !!link && TRACKED.has(link); }
function toggleTrack(link){ if(!link) return; if(TRACKED.has(link)) TRACKED.delete(link); else TRACKED.add(link); saveTracked(); }

function trkInjectStyle(){
  if(document.getElementById('trkStyle')) return;
  const st=document.createElement('style'); st.id='trkStyle';
  st.textContent=`
  .card{ position:relative; }
  .trk-btn{ position:absolute; top:9px; right:10px; cursor:pointer; font-size:13px; line-height:1;
            opacity:.5; transition:opacity .15s, transform .15s; user-select:none; }
  .trk-btn:hover{ opacity:1; transform:scale(1.18); }
  .trk-btn.on{ opacity:1; }
  .chip-trk{ color:#ff6b6b !important; }
  .chip-trk.active{ background:rgba(255,59,59,.18) !important; border-color:#ff3b3b !important; color:#fff !important; }
  @keyframes trkPulse{ 0%{ stroke-opacity:1; stroke-width:2; } 50%{ stroke-opacity:.15; stroke-width:9; } 100%{ stroke-opacity:1; stroke-width:2; } }
  .trk-pulse{ stroke:#ff3b3b !important; animation:trkPulse 1.2s infinite; }`;
  document.head.appendChild(st);
}

function decorateAfterRender(){
  trkInjectStyle();
  // 1) Tombol 📌 di tiap kartu
  document.querySelectorAll('.feedpane .card[data-id]').forEach(card=>{
    const b=byId[card.dataset.id]; if(!b) return;
    let btn=card.querySelector('.trk-btn');
    if(!btn){ btn=document.createElement('span'); btn.className='trk-btn'; card.appendChild(btn); }
    const on=isTracked(b.link);
    btn.textContent = on ? '🔴' : '📌';
    btn.title = on ? 'Berhenti pantau' : 'Pantau peristiwa';
    btn.classList.toggle('on', on);
    btn.onclick=(ev)=>{ ev.stopPropagation(); toggleTrack(b.link); render(); };
  });
  // 2) Chip "🔴 Live Tracking (n)" di deret filter
  const fEl=document.getElementById('filters');
  if(fEl && !fEl.querySelector('.chip-trk')){
    const c=document.createElement('span');
    c.className='chip chip-trk'+(fTracked?' active':'');
    c.textContent='🔴 Live Tracking ('+TRACKED.size+')';
    c.onclick=()=>{ fTracked=!fTracked; if(fTracked) fKat='semua'; render(); };
    fEl.appendChild(c);
  }
  // 3) Pesan kosong khusus saat mode tracking tapi belum ada yang dipantau
  if(fTracked && TRACKED.size===0){
    const feed=document.getElementById('feed');
    if(feed) feed.innerHTML='<div class="empty">📌 Belum ada peristiwa yang dipantau. Klik 📌 di kartu mana pun untuk mulai memantau.</div>';
  }
  // 4) Denyut merah di marker yang dipantau
  Object.keys(markerById).forEach(id=>{
    const b=byId[id], m=markerById[id]; if(!b||!m) return;
    const elp = m.getElement ? m.getElement() : null;
    if(elp) elp.classList.toggle('trk-pulse', isTracked(b.link));
  });
}

// Bungkus render() agar dekorasi tracking jalan otomatis SETIAP render (termasuk saat klik filter)
const _origRender = render;
render = function(){ _origRender.apply(this, arguments); decorateAfterRender(); };
/* ===== Denyut marker saat kartu diklik (focus highlight) ===== */
let focusedLink = null;
(function focusInjectStyle(){
  if(document.getElementById('focusStyle')) return;
  const st=document.createElement('style'); st.id='focusStyle';
  st.textContent=`
  @keyframes focusPulse{ 0%{ stroke-opacity:1; stroke-width:2; } 50%{ stroke-opacity:.1; stroke-width:18; } 100%{ stroke-opacity:1; stroke-width:2; } }
  .focus-pulse{ stroke:#3b82f6 !important; animation:focusPulse 1s infinite; filter:drop-shadow(0 0 6px #3b82f6); }`;
  document.head.appendChild(st);
})();

function applyFocusPulse(){
  Object.keys(markerById).forEach(id=>{
    const b=byId[id], m=markerById[id]; if(!b||!m) return;
    const elp = m.getElement ? m.getElement() : null; if(!elp) return;
    const on = !!focusedLink && b.link===focusedLink;
    elp.classList.toggle('focus-pulse', on);
    if(on && m.bringToFront) m.bringToFront();
  });
}

// Bungkus focusArticle() agar klik kartu/ticker otomatis menyalakan denyut
const _focusOrig = focusArticle;
focusArticle = function(b){ focusedLink = (b && b.link) ? b.link : null; _focusOrig.apply(this, arguments); applyFocusPulse(); };

// Pertahankan denyut walau feed/peta di-render ulang
const _renderForFocus = render;
render = function(){ _renderForFocus.apply(this, arguments); applyFocusPulse(); };
/* ===== Story Clustering v1 (gabung berita serupa) ===== */
const CLUSTER_WINDOW_H = 12;     // jendela waktu (jam)
const CLUSTER_MIN_SHARED = 2;    // minimal entitas yang sama
const CLUSTER_LOC_SKIP = new Set(['','global','indonesia (nasional)','indonesia','nasional']);
let CLUSTER_HIDDEN = new Set();
let CLUSTER_MEMBERS = {};

function cluTime(b){ const t=Date.parse((b&&b.pub_date)||''); return isNaN(t)?0:t; }
function cluLoc(b){ return ((b&&b.location)||'').trim().toLowerCase(); }
function cluEnts(b){ return new Set(((b&&b.entities)||[]).map(e=>String(e).trim().toLowerCase()).filter(Boolean)); }
function cluShared(a,b){ let n=0; a.forEach(x=>{ if(b.has(x)) n++; }); return n; }

function computeClusters() {
  CLUSTER_HIDDEN = new Set();
  CLUSTER_MEMBERS = {};
  // Saat sedang mencari, jangan sembunyikan apa pun (biar hasil pencarian lengkap)
  if (typeof fQuery === "string" && fQuery.trim()) return;
  // 1) Kelompokkan berita berdasarkan cluster_id dari backend (pgvector)
  const groups = {};
  for (const b of SEMUA || []) {
    if (!b || !b.link || !b.cluster_id) continue;
    (groups[b.cluster_id] = groups[b.cluster_id] || []).push(b);
  }
  // 2) Cluster ≥ 2 berita: berita terbaru jadi judul utama, sisanya ke panel
  for (const cid of Object.keys(groups)) {
    const arr = groups[cid];
    if (arr.length < 2) continue;
    arr.sort((a, b) => cluTime(b) - cluTime(a)); // terbaru dulu
    const primary = arr[0];
    const members = arr.slice(1).filter((m) => !isTracked(m.link));
    if (members.length === 0) continue;
    CLUSTER_MEMBERS[primary.link] = members;
    for (const m of members) CLUSTER_HIDDEN.add(m.link);

    // === BARU: ambil narasi cluster (tersimpan di baris seed mana pun di grup) ===
    let narr = null;
    const seedRow = arr.find((x) => x.cluster_narrative);
    if (seedRow) {
      try { narr = JSON.parse(seedRow.cluster_narrative); } catch (e) { narr = null; }
    }
    primary._narr = narr; // tempel ke objek primary, dibaca saat render panel
  }
}

(function cluInjectStyle(){
  if(document.getElementById('cluStyle')) return;
  const st=document.createElement('style'); st.id='cluStyle';
  st.textContent=`
.card{ overflow:visible !important; height:auto !important; max-height:none !important; flex-wrap:wrap !important; }
.clu-wrap{ width:100% !important; flex-basis:100% !important; order:99; margin-top:10px; }
.clu-bar{ display:flex; align-items:center; gap:8px; background:#241b3a; border:1px solid #8b5cf6; border-left:4px solid #8b5cf6; border-radius:8px; padding:9px 12px; cursor:pointer; user-select:none; color:#e7ddff; font-size:13px; font-weight:700; transition:background .15s, box-shadow .15s; }
.clu-bar:hover{ background:#2e2350; box-shadow:0 0 0 2px rgba(139,92,246,.4); }
.clu-ic{ font-size:15px; }
.clu-count{ background:#8b5cf6; color:#fff; border-radius:999px; padding:1px 9px; font-size:12px; font-weight:800; min-width:20px; text-align:center; }
.clu-label{ flex:1; }
.clu-tri{ font-size:11px; opacity:.85; }
.clu-list{ margin-top:8px; border-left:2px solid #8b5cf6; padding-left:12px; }
.clu-row{ padding:5px 0; }
.clu-meta{ color:#8a93a6; font-size:11px; margin-bottom:2px; }
.clu-link{ color:#c7cede; font-size:13px; text-decoration:none; }
.clu-link:hover{ color:#fff; text-decoration:underline; }
.clu-narr{ background:#1c1530; border:1px solid #8b5cf6; border-radius:8px; padding:11px 13px; margin-bottom:8px; }
.clu-narr-title{ color:#f3ecff; font-size:14px; font-weight:800; line-height:1.35; margin-bottom:5px; }
.clu-narr-sum{ color:#c7cede; font-size:12.5px; line-height:1.5; margin-bottom:8px; }
.clu-tl{ border-left:2px solid #8b5cf6; padding-left:10px; display:flex; flex-direction:column; gap:5px; }
.clu-tl-row{ display:flex; gap:8px; align-items:baseline; }
.clu-tl-time{ color:#8b5cf6; font-size:11px; font-weight:700; min-width:54px; flex-shrink:0; }
.clu-tl-text{ color:#aeb6c6; font-size:12px; line-height:1.4; }`;
  document.head.appendChild(st);
})();

function buildClusterPanels() {
  const feed = document.getElementById('feed'); if (!feed) return;
  feed.querySelectorAll('.card[data-id]').forEach(card => {
    const b = byId[card.dataset.id]; if (!b) return;
    const members = CLUSTER_MEMBERS[b.link];
    if (!members || !members.length) return;
    if (card.querySelector('.clu-wrap')) return;
    const wrap = document.createElement('div'); wrap.className = 'clu-wrap';
    wrap.onclick = (e) => e.stopPropagation();

    // === BARU: kartu narasi (judul + ringkasan + linimasa) ===
    const narr = b._narr;
    if (narr && narr.title) {
      const nb = document.createElement('div'); nb.className = 'clu-narr';
      const t = document.createElement('div'); t.className = 'clu-narr-title';
      t.textContent = '🧵 ' + narr.title;
      nb.appendChild(t);
      if (narr.summary) {
        const s = document.createElement('div'); s.className = 'clu-narr-sum';
        s.textContent = narr.summary; nb.appendChild(s);
      }
      if (Array.isArray(narr.timeline) && narr.timeline.length) {
        const tl = document.createElement('div'); tl.className = 'clu-tl';
        narr.timeline.forEach(ev => {
          if (!ev) return;
          const r = document.createElement('div'); r.className = 'clu-tl-row';
          const w = document.createElement('span'); w.className = 'clu-tl-time';
          w.textContent = ev.waktu || '';
          const x = document.createElement('span'); x.className = 'clu-tl-text';
          x.textContent = ev.teks || '';
          r.appendChild(w); r.appendChild(x); tl.appendChild(r);
        });
        nb.appendChild(tl);
      }
      wrap.appendChild(nb);
    }

    const bar = document.createElement('div'); bar.className = 'clu-bar';
    bar.innerHTML = '<span class="clu-ic">🧵</span><span class="clu-count">' + members.length + '</span><span class="clu-label">pembaruan terkait</span><span class="clu-tri">&#9656;</span>';
    const list = document.createElement('div'); list.className = 'clu-list'; list.style.display = 'none';
    members.slice().sort((x, y) => cluTime(y) - cluTime(x)).forEach(m => {
      const row = document.createElement('div'); row.className = 'clu-row';
      const meta = document.createElement('div'); meta.className = 'clu-meta';
      meta.textContent = (typeof waktuRelatif === 'function' ? waktuRelatif(m.pub_date) + ' · ' : '') + (m.source || '');
      const a = document.createElement('a'); a.className = 'clu-link'; a.href = m.link || '#'; a.target = '_blank'; a.rel = 'noopener';
      a.textContent = m.title || '(tanpa judul)';
      row.appendChild(meta); row.appendChild(a); list.appendChild(row);
    });
    bar.onclick = () => { const hidden = list.style.display === 'none'; list.style.display = hidden ? 'block' : 'none'; const tri = bar.querySelector('.clu-tri'); if (tri) tri.innerHTML = hidden ? '&#9662;' : '&#9656;'; };
    wrap.appendChild(bar); wrap.appendChild(list); card.appendChild(wrap);
  });
}

function initMap(){

  markersLayer=L.layerGroup().addTo(map);
  setTimeout(()=>map.invalidateSize(),200);
  window.addEventListener('resize',()=>map.invalidateSize());
}
async function muat() {

		const SUPABASE_ANON_KEY =
			"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2cWJza29rZm5sbWFzYmtwd2xxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTI2MTAsImV4cCI6MjA5Nzc2ODYxMH0.KwSwG8GtiuID39ocCoKJ6hbuJYCseAcdrwCCabMUPJg";
		const KOLOM=
			'id,title,link,source,category,pub_date,summary,impact_score,location,entities,lat,lon,cluster_id,is_primary,cluster_narrative,cluster_narrative_n';

		// 🔁 Ambil SEMUA baris via paginasi (Supabase batasi 1000 baris per permintaan)

					},
				},
			);
			const data = await res.json();
			const batch = Array.isArray(data) ? data : [];
			semua = semua.concat(batch);
			if (batch.length < PAGE) break; // sudah halaman terakhir
		}

		const f = (a, i) => ({
			_id: String(i),
			title: a.title ?? a.judul ?? "(tanpa judul)",

			category: a.category ?? a.kategori ?? "lainnya",
			pub_date: a.pub_date ?? a.tanggal ?? a.published ?? "",
			summary: a.summary ?? a.ringkasan ?? null,
			score: a.impact_score ?? a.skor ?? null,
			location: a.location ?? null,
			entities: parseEntities(a.entities),
			lat: num(a.lat),
			lon: num(a.lon),
			cluster_id: a.cluster_id ?? null,
      is_primary: !!a.is_primary,
      cluster_narrative: a.cluster_narrative ?? null,   // ← BARU
      cluster_narrative_n: a.cluster_narrative_n ?? 0,  // ← BARU
		});
		let arr = semua.map(f);
		const batas = Date.now() - HARI * 86400000;
		arr = arr.filter((b) => {
			if (!b.pub_date) return true;
			const t = new Date(b.pub_date).getTime();
			if (isNaN(t)) return true;
			return t >= batas;
		});

}
function buildTicker(){
  const flash=SEMUA.filter(b=>urgency(b.score)==='flash').slice(0,15);
  const el=document.getElementById('ticker');
  if(!flash.length){ el.classList.add('hide'); el.innerHTML=''; return; }
  el.classList.remove('hide');
  const inner=flash.map(b=>`<span class="tk" data-id="${b._id}"><b>🔴 ${b.score??''}</b> ${b.title}</span>`).join('');
  el.innerHTML=`<div class="ticker-track">${inner}${inner}</div>`;
  el.querySelectorAll('.tk').forEach(t=>t.onclick=()=>focusArticle(byId[t.dataset.id]));
}
function cardHTML(b){ const u=urgency(b.score);
  const locTag = b.location ? ((b.location==='Global')?'<span class="tag">🌐 Global</span>':(b.location==='Indonesia (Nasional)')?'<span class="tag">🏛️ Nasional</span>':`<span class="tag loc">📍 ${b.location}</span>`) : '';
  const entTags=b.entities.map(e=>`<span class="tag ent">${e}</span>`).join('');
  const geo=(b.lat!=null&&b.lon!=null)?'<span class="pinhint" title="Ada di peta">📍</span>':'';
  const warn=(b.summary&&b.summary.includes('🚩'))?'<span class="lvl" style="background:#7c2d12;color:#fed7aa">🚩 CEK ULANG</span>':((b.summary&&b.summary.includes('Belum terverifikasi'))?'<span class="lvl" style="background:#3a4252;color:#fcd34d">⚠️ RUMOR</span>':'');
  return `<div class="card ${u}" data-id="${b._id}"><div class="row1"><span class="lvl ${u}">${urgLabel(u)}${b.score!=null?' '+b.score:''}</span>${warn}<span class="time">${waktuRelatif(b.pub_date)}</span>${geo}</div><div class="title"><a href="${b.link}" target="_blank">${b.title}</a></div>${b.summary?`<div class="summary">${b.summary}</div>`:''}<div class="tags">${locTag}<span class="tag">${katLabel(b.category.toLowerCase())}</span>${entTags}${b.source?`<span class="tag">${b.source}</span>`:''}</div></div>`;
}
function highlightCard(id){ document.querySelectorAll('.card').forEach(c=>c.classList.remove('active')); const el=document.querySelector(`.card[data-id="${id}"]`); if(el){ el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'center'}); } }
function focusArticle(b){ if(!b) return; const m=markerById[b._id]; if(m){ map.setView(m.getLatLng(),7); m.openPopup(); } highlightCard(b._id); }
function render(){
  const cats = new Set(SEMUA.map(b=>b.category.toLowerCase()));
  cats.add('bencana');
  cats.add('sosmed');
  const kats=['semua', ...Array.from(cats)];
  const urgs=[['semua','Semua'],['flash','🔴 Flash'],['urgent','🟠 Urgent'],['info','🟡 Info']];
  const sorts=[['skor','⚡ Skor AI'],['terbaru','🕒 Terbaru']];
  const fEl=document.getElementById('filters');
  fEl.innerHTML = kats.map(k=>`<span class="chip ${fKat===k?'active':''}" data-kat="${k}">${katLabel(k)}</span>`).join('')+'<span style="width:10px"></span>'+urgs.map(([v,l])=>`<span class="chip ${fUrg===v?'active':''}" data-urg="${v}">${l}</span>`).join('')+'<span style="width:10px"></span>'+sorts.map(([v,l])=>`<span class="chip ${fSort===v?'active':''}" data-sort="${v}">${l}</span>`).join('');
  fEl.querySelectorAll('[data-kat]').forEach(el=>el.onclick=()=>{ fKat=el.dataset.kat; render(); });
  fEl.querySelectorAll('[data-urg]').forEach(el=>el.onclick=()=>{ fUrg=el.dataset.urg; render(); });
  fEl.querySelectorAll('[data-sort]').forEach(el=>el.onclick=()=>{ fSort=el.dataset.sort; render(); });
  const q=fQuery;
  let list=SEMUA.filter(b=> (!CLUSTER_HIDDEN.has(b.link) || isTracked(b.link)) && (fKat==='semua'||b.category.toLowerCase()===fKat) && (fUrg==='semua'||urgency(b.score)===fUrg) && (!q || (b.title+' '+(b.summary||'')+' '+(b.source||'')+' '+(b.location||'')+' '+b.entities.join(' ')).toLowerCase().includes(q)) );
  list.sort((x,y)=>{ if(fSort==='terbaru'){ return new Date(y.pub_date)-new Date(x.pub_date); } const sx=x.score==null?-1:Number(x.score), sy=y.score==null?-1:Number(y.score); if(sy!==sx) return sy-sx; return new Date(y.pub_date)-new Date(x.pub_date); });
  const feed=document.getElementById('feed');
  if(!list.length){ feed.innerHTML='<div class="empty">Tidak ada berita untuk filter ini.</div>'; }
  else if(fSort==='terbaru'){ let html='', lastG=null, first=true; list.forEach(b=>{ const g=timeBucket(b.pub_date); if(g!==lastG){ html+=`<div class="group-head${first?' first':''}">${g}</div>`; lastG=g; first=false; } html+=cardHTML(b); }); feed.innerHTML=html; }
  else { feed.innerHTML=list.map(cardHTML).join(''); }
  feed.querySelectorAll('.card').forEach(el=>{ el.addEventListener('click',(ev)=>{ if(ev.target.tagName==='A') return; focusArticle(byId[el.dataset.id]); }); });
  markersLayer.clearLayers(); markerById={};
  list.forEach(b=>{ if(b.lat!=null && b.lon!=null){ const u=urgency(b.score);
    const m=L.circleMarker([b.lat,b.lon],{ radius:8, color:'#0b0e14', weight:1, fillColor:colorOf(u), fillOpacity:.9 });
    m.bindPopup(`<b>${b.title}</b><br><small style="color:#7dd3fc">📍 ${b.location||''}</small><br><span style="color:#c3cad8">${b.summary||''}</span><br><a href="${b.link}" target="_blank">Buka berita →</a>`);
    m.on('click',()=>highlightCard(b._id)); m.addTo(markersLayer); markerById[b._id]=m;
  }});
  const scored=SEMUA.filter(b=>b.score!=null).length, dipeta=Object.keys(markerById).length;
  document.getElementById('sub').textContent=`${SEMUA.length} berita · ${scored} dianalisis AI · ${dipeta} di peta`;
}
document.getElementById('search').addEventListener('input',e=>{ fQuery=e.target.value.toLowerCase().trim(); render(); });
document.getElementById('btnCompact').onclick=function(){ compact=!compact; document.body.classList.toggle('compact',compact); this.classList.toggle('active',compact); };
document.getElementById('btnMap').onclick=function(){ mapHidden=!mapHidden; document.querySelector('.mappane').classList.toggle('hide',mapHidden); document.querySelector('.feedpane').classList.toggle('full',mapHidden); this.classList.toggle('active',mapHidden); this.textContent=mapHidden?'🗺️ Tampilkan Peta':'🗺️ Sembunyikan Peta'; if(!mapHidden) setTimeout(()=>map.invalidateSize(),120); };
initMap(); muat(); setInterval(muat,120000);
</script>
