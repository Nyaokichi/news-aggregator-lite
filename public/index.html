<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dataminr Lite</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{ --bg:#0b0e14; --panel:#141925; --panel2:#1c2333; --border:#2a3344; --text:#e6e9ef; --muted:#8a93a6; --flash:#ff3b3b; --urgent:#ff9f1c; --info:#ffd23f; --accent:#3b82f6; }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{ margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,"Segoe UI",Roboto,sans-serif; display:flex; flex-direction:column; }
  header{ flex:0 0 auto; background:rgba(11,14,20,.95); border-bottom:1px solid var(--border); padding:12px 20px; }
  .brand{ display:flex; align-items:center; gap:10px; font-weight:800; font-size:19px; letter-spacing:.5px; }
  .live{ display:inline-flex; align-items:center; gap:6px; font-size:12px; color:#4ade80; font-weight:700; }
  .dot-live{ width:8px; height:8px; border-radius:50%; background:#4ade80; animation:pulseLive 1.6s infinite; }
  @keyframes pulseLive{ 0%{box-shadow:0 0 0 0 rgba(74,222,128,.7);} 70%{box-shadow:0 0 0 8px rgba(74,222,128,0);} 100%{box-shadow:0 0 0 0 rgba(74,222,128,0);} }
  .sub{ color:var(--muted); font-size:12px; margin-top:3px; }
  .layout{ flex:1 1 auto; display:flex; min-height:0; }
  .feedpane{ width:46%; overflow-y:auto; padding:14px 16px; border-right:1px solid var(--border); }
  .mappane{ width:54%; position:relative; }
  #map{ position:absolute; inset:0; background:#0b0e14; }
  .filters{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
  .chip{ background:var(--panel2); border:1px solid var(--border); color:var(--muted); padding:6px 12px; border-radius:999px; font-size:13px; cursor:pointer; user-select:none; }
  .chip.active{ color:#fff; border-color:var(--accent); background:rgba(59,130,246,.18); }
  .card{ background:var(--panel); border:1px solid var(--border); border-left-width:4px; border-radius:10px; padding:12px 14px; margin-bottom:12px; cursor:pointer; transition:outline .15s; }
  .card.flash{ border-left-color:var(--flash); } .card.urgent{ border-left-color:var(--urgent); } .card.info{ border-left-color:var(--info); } .card.none{ border-left-color:var(--border); }
  .card.active{ outline:2px solid var(--accent); outline-offset:1px; }
  .row1{ display:flex; align-items:center; gap:10px; margin-bottom:6px; flex-wrap:wrap; }
  .lvl{ font-size:11px; font-weight:800; letter-spacing:.5px; padding:2px 8px; border-radius:6px; }
  .lvl.flash{ background:var(--flash); color:#fff; } .lvl.urgent{ background:var(--urgent); color:#0b0e14; } .lvl.info{ background:var(--info); color:#0b0e14; } .lvl.none{ background:#3a4252; color:#cfd6e4; }
  .time{ color:var(--muted); font-size:12px; } .pinhint{ font-size:12px; }
  .title{ font-weight:600; font-size:15px; line-height:1.35; }
  .title a{ color:var(--text); text-decoration:none; } .title a:hover{ color:var(--accent); }
  .summary{ color:#c3cad8; font-size:13.5px; margin-top:6px; }
  .tags{ margin-top:8px; display:flex; gap:6px; flex-wrap:wrap; }
  .tag{ font-size:11px; color:var(--muted); background:var(--panel2); border:1px solid var(--border); padding:2px 8px; border-radius:6px; }
  .tag.loc{ color:#7dd3fc; border-color:#1e3a52; } .tag.ent{ color:#fcd34d; border-color:#4a3c12; }
  .empty{ color:var(--muted); text-align:center; padding:40px; }
  .leaflet-popup-content-wrapper,.leaflet-popup-tip{ background:var(--panel); color:var(--text); }
  .leaflet-popup-content{ margin:10px 12px; font-size:13px; line-height:1.4; }
  .leaflet-popup-content a{ color:var(--accent); }
  @media(max-width:820px){ .layout{ flex-direction:column; } .feedpane,.mappane{ width:100%; } .feedpane{ border-right:none; } .mappane{ height:55vh; flex:0 0 auto; } }
</style>
</head>
<body>
<header>
  <div class="brand">🛰️ DATAMINR LITE <span class="live"><span class="dot-live"></span>LIVE</span></div>
  <div class="sub" id="sub">Memuat…</div>
</header>
<div class="layout">
  <div class="feedpane"><div class="filters" id="filters"></div><div id="feed"><div class="empty">Memuat…</div></div></div>
  <div class="mappane"><div id="map"></div></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const HARI=14; let SEMUA=[], byId={}, markerById={}; let fKat='semua', fUrg='semua'; let map, markersLayer;
const cap=(s)=> s? s.charAt(0).toUpperCase()+s.slice(1):s;
function urgency(s){ if(s==null) return 'none'; if(s>=8) return 'flash'; if(s>=5) return 'urgent'; return 'info'; }
function urgLabel(u){ return {flash:'FLASH',urgent:'URGENT',info:'INFO',none:'—'}[u]; }
function colorOf(u){ return {flash:'#ff3b3b',urgent:'#ff9f1c',info:'#ffd23f',none:'#8a93a6'}[u]; }
function parseEntities(e){ if(!e) return []; if(Array.isArray(e)) return e; try{ const p=JSON.parse(e); return Array.isArray(p)?p:[]; }catch(_){ return []; } }
function num(v){ if(v==null) return null; const n=Number(v); return isNaN(n)?null:n; }
function waktuRelatif(d){ if(!d) return ''; const t=new Date(d).getTime(); if(isNaN(t)) return ''; const diff=Date.now()-t, m=Math.floor(diff/60000), h=Math.floor(diff/3600000), hari=Math.floor(diff/86400000); if(m<1) return 'Baru saja'; if(m<60) return m+' menit lalu'; if(h<24) return h+' jam lalu'; return hari+' hari lalu'; }
function initMap(){
  map=L.map('map',{zoomControl:true}).setView([-2.5,118],4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{ attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19 }).addTo(map);
  markersLayer=L.layerGroup().addTo(map);
  setTimeout(()=>map.invalidateSize(),200);
  window.addEventListener('resize',()=>map.invalidateSize());
}
async function muat(){
  try{
    const SUPABASE_URL=https://vvqbskokfnlmasbkpwlq.supabase.co/;
const SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2cWJza29rZm5sbWFzYmtwd2xxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTI2MTAsImV4cCI6MjA5Nzc2ODYxMH0.KwSwG8GtiuID39ocCoKJ6hbuJYCseAcdrwCCabMUPJg;
const res=await fetch(SUPABASE_URL+'/rest/v1/articles?select=*&order=impact_score.desc.nullslast,pub_date.desc', { headers:{ apikey:SUPABASE_ANON_KEY, Authorization:'Bearer '+SUPABASE_ANON_KEY } }); const data=await res.json(); let semua=[];
    if(Array.isArray(data)) semua=data;
    else if(data && Array.isArray(data.articles)) semua=data.articles;
    else if(data && typeof data==='object'){ for(const k of Object.keys(data)){ if(Array.isArray(data[k])) data[k].forEach(a=>semua.push({...a, category:a.category||a.kategori||k})); } }
    const f=(a,i)=>({ _id:String(i), title:a.title??a.judul??'(tanpa judul)', link:a.link??a.url??'#', source:a.source??a.sumber??'', category:(a.category??a.kategori??'lainnya'), pub_date:a.pub_date??a.tanggal??a.published??'', summary:a.summary??a.ringkasan??null, score:(a.impact_score??a.skor??null), location:a.location??null, entities:parseEntities(a.entities), lat:num(a.lat), lon:num(a.lon) });
    let arr=semua.map(f); const batas=Date.now()-HARI*86400000;
    arr=arr.filter(b=>{ if(!b.pub_date) return true; const t=new Date(b.pub_date).getTime(); if(isNaN(t)) return true; return t>=batas; });
    arr.sort((x,y)=>{ const sx=x.score==null?-1:Number(x.score), sy=y.score==null?-1:Number(y.score); if(sy!==sx) return sy-sx; return new Date(y.pub_date)-new Date(x.pub_date); });
    arr.forEach((b,i)=>b._id=String(i)); SEMUA=arr; byId={}; SEMUA.forEach(b=>byId[b._id]=b); render();
  }catch(e){ document.getElementById('feed').innerHTML='<div class="empty">Gagal memuat: '+e.message+'</div>'; }
}
function cardHTML(b){ const u=urgency(b.score);
  const locTag = b.location ? ((b.location==='Global')?'<span class="tag">🌐 Global</span>':(b.location==='Indonesia (Nasional)')?'<span class="tag">🏛️ Nasional</span>':`<span class="tag loc">📍 ${b.location}</span>`) : '';
  const entTags=b.entities.map(e=>`<span class="tag ent">${e}</span>`).join('');
  const geo=(b.lat!=null&&b.lon!=null)?'<span class="pinhint" title="Ada di peta">📍</span>':'';
  return `<div class="card ${u}" data-id="${b._id}"><div class="row1"><span class="lvl ${u}">${urgLabel(u)}${b.score!=null?' '+b.score:''}</span><span class="time">${waktuRelatif(b.pub_date)}</span>${geo}</div><div class="title"><a href="${b.link}" target="_blank">${b.title}</a></div>${b.summary?`<div class="summary">${b.summary}</div>`:''}<div class="tags">${locTag}<span class="tag">${cap(b.category)}</span>${entTags}${b.source?`<span class="tag">${b.source}</span>`:''}</div></div>`;
}
function highlightCard(id){ document.querySelectorAll('.card').forEach(c=>c.classList.remove('active')); const el=document.querySelector(`.card[data-id="${id}"]`); if(el){ el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'center'}); } }
function focusArticle(b){ const m=markerById[b._id]; if(m){ map.setView(m.getLatLng(),7); m.openPopup(); } highlightCard(b._id); }
function render(){
  const kats=['semua', ...Array.from(new Set(SEMUA.map(b=>b.category.toLowerCase())))];
  const urgs=[['semua','Semua'],['flash','🔴 Flash'],['urgent','🟠 Urgent'],['info','🟡 Info']];
  const fEl=document.getElementById('filters');
  fEl.innerHTML = kats.map(k=>`<span class="chip ${fKat===k?'active':''}" data-kat="${k}">${k==='semua'?'Semua':cap(k)}</span>`).join('')+'<span style="width:10px"></span>'+urgs.map(([v,l])=>`<span class="chip ${fUrg===v?'active':''}" data-urg="${v}">${l}</span>`).join('');
  fEl.querySelectorAll('[data-kat]').forEach(el=>el.onclick=()=>{ fKat=el.dataset.kat; render(); });
  fEl.querySelectorAll('[data-urg]').forEach(el=>el.onclick=()=>{ fUrg=el.dataset.urg; render(); });
  const list=SEMUA.filter(b=> (fKat==='semua'||b.category.toLowerCase()===fKat) && (fUrg==='semua'||urgency(b.score)===fUrg) );
  const feed=document.getElementById('feed');
  feed.innerHTML = list.length? list.map(cardHTML).join('') : '<div class="empty">Tidak ada berita untuk filter ini.</div>';
  feed.querySelectorAll('.card').forEach(el=>{ el.addEventListener('click',(ev)=>{ if(ev.target.tagName==='A') return; focusArticle(byId[el.dataset.id]); }); });
  markersLayer.clearLayers(); markerById={};
  list.forEach(b=>{ if(b.lat!=null && b.lon!=null){ const u=urgency(b.score);
    const m=L.circleMarker([b.lat,b.lon],{ radius:8, color:'#0b0e14', weight:1, fillColor:colorOf(u), fillOpacity:.9 });
    m.bindPopup(`<b>${b.title}</b><br><small style="color:#7dd3fc">📍 ${b.location||''}</small><br><span style="color:#c3cad8">${b.summary||''}</span><br><a href="${b.link}" target="_blank">Buka berita →</a>`);
    m.on('click',()=>highlightCard(b._id)); m.addTo(markersLayer); markerById[b._id]=m;
  }});
  const scored=SEMUA.filter(b=>b.score!=null).length, dipeta=Object.keys(markerById).length;
  document.getElementById('sub').textContent=`${SEMUA.length} berita · ${scored} dianalisis AI · ${dipeta} di peta`;
}
initMap(); muat(); setInterval(muat,120000);
</script>
</body>
</html>
